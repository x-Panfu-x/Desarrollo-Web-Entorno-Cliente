<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validacion JSON</title>
</head>
<body>

    <h2>Validacion de Datos JSON</h2>

    <p>Pega un JSON y nosotros te lo arreglamos</p>

    <textarea id="jsonInput">
        { "name": "Ana", "age": 25 }
    </textarea>
    <br><br>

    <button onclick="validacion()">validar JSON</button>

    <h3>Resultado</h3>
    
    <div id="resultado"></div>

    <script>
        class ValidacionErrores extends Error {
            constructor(err){
                super(err);
                this.name = "validación erronea";
            }
        }

        function ValidarDatos(object) {
            if (!object) {
                throw new ValidacionErrores("El JSON es null");
                
            }
            // Validar name
            if (object.name === undefined) {
            throw new ValidacionErrores("El JSON no tiene name");
            }

            if (typeof object.name !== "string") {
            throw new ValidacionErrores("name debe ser un string");
            }

            if (object.name.trim() === "") {
            throw new ValidacionErrores("name no puede estar vacio");
            }

            // Validar age
            if (object.age === undefined) {
                throw new ValidacionErrores("El JSON no tiene age");
            }

            if (typeof object.age !== "number") {
                throw new ValidacionErrores("age debe ser un numero");
            }

            if (object.age <= 0) {
                throw new ValidacionErrores("age debe ser mayor que 0");
            }


        }




        function validacion() {
            const resultado = document.getElementById("resultado");
            resultado.innerHTML = "";

            try {
                const texto = document.getElementById("jsonInput").value;

                if (!texto.trim()) {
                    throw new ValidacionErrores("El JSON esta vacio");
                }

                const textoJSON = JSON.parse(texto);

                ValidarDatos(textoJSON);

                resultado.innerHTML = "JSON VALIDO"

                
            } catch (error) {
                if (error instanceof SyntaxError) {
                    resultado.innerHTML = "Error de sintaxis: JSON mal formado";
                } else if (error instanceof ValidacionErrores) {
                    resultado.innerHTML = error.message
                }else{
                    resultado.innerHTML= "error inesperado";
                }
                
            }


        }




    </script>


</body>
</html>
